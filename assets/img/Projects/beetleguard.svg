<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="gr1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#16a34a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg1)" rx="10"/>
  <!-- Grid lines -->
  <line x1="0" y1="40" x2="400" y2="40" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="80" x2="400" y2="80" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="120" x2="400" y2="120" stroke="#1e293b" stroke-width="1"/>
  <line x1="0" y1="160" x2="400" y2="160" stroke="#1e293b" stroke-width="1"/>
  <!-- LoRa Wave arcs -->
  <circle cx="200" cy="130" r="20" fill="none" stroke="#22c55e" stroke-width="2" opacity="0.9"/>
  <circle cx="200" cy="130" r="40" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.65"/>
  <circle cx="200" cy="130" r="60" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.4"/>
  <circle cx="200" cy="130" r="80" fill="none" stroke="#22c55e" stroke-width="0.7" opacity="0.2"/>
  <!-- Center node -->
  <circle cx="200" cy="130" r="8" fill="#22c55e"/>
  <!-- Satellite nodes -->
  <circle cx="80" cy="90" r="6" fill="#16a34a"/>
  <circle cx="310" cy="80" r="6" fill="#16a34a"/>
  <circle cx="340" cy="160" r="6" fill="#16a34a"/>
  <circle cx="70" cy="170" r="6" fill="#16a34a"/>
  <!-- Connection lines -->
  <line x1="200" y1="130" x2="80" y2="90" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="200" y1="130" x2="310" y2="80" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="200" y1="130" x2="340" y2="160" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <line x1="200" y1="130" x2="70" y2="170" stroke="#22c55e" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
  <!-- Label -->
  <rect x="10" y="10" width="160" height="24" rx="4" fill="#22c55e" opacity="0.15"/>
  <text x="20" y="27" font-family="monospace" font-size="12" fill="#22c55e" font-weight="bold">LoRa · IoT · 100+ Nodes</text>
  <!-- Tech badges -->
  <rect x="10" y="190" width="60" height="18" rx="9" fill="#22c55e" opacity="0.2"/>
  <text x="23" y="203" font-family="monospace" font-size="9" fill="#22c55e">STM32</text>
  <rect x="78" y="190" width="55" height="18" rx="9" fill="#22c55e" opacity="0.2"/>
  <text x="89" y="203" font-family="monospace" font-size="9" fill="#22c55e">LoRa</text>
  <rect x="141" y="190" width="55" height="18" rx="9" fill="#22c55e" opacity="0.2"/>
  <text x="149" y="203" font-family="monospace" font-size="9" fill="#22c55e">FreeRTOS</text>
  <rect x="204" y="190" width="55" height="18" rx="9" fill="#22c55e" opacity="0.2"/>
  <text x="213" y="203" font-family="monospace" font-size="9" fill="#22c55e">2km range</text>
</svg>
