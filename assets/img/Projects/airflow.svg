<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg7)" rx="10"/>
  <!-- Flow tube -->
  <rect x="20" y="90" width="360" height="40" rx="20" fill="#1e293b" stroke="#06b6d4" stroke-width="2"/>
  <!-- Flow arrows inside tube -->
  <polygon points="60,105 85,110 60,115"  fill="#06b6d4" opacity="0.5"/>
  <polygon points="95,105 120,110 95,115"  fill="#06b6d4" opacity="0.6"/>
  <polygon points="130,105 155,110 130,115" fill="#06b6d4" opacity="0.7"/>
  <polygon points="165,105 190,110 165,115" fill="#06b6d4" opacity="0.8"/>
  <polygon points="200,105 225,110 200,115" fill="#06b6d4" opacity="0.9"/>
  <polygon points="235,105 260,110 235,115" fill="#06b6d4"/>
  <!-- Sensor block on tube -->
  <rect x="270" y="75" width="70" height="70" rx="6" fill="#1e3a5f" stroke="#06b6d4" stroke-width="2"/>
  <text x="305" y="100" font-family="monospace" font-size="7" fill="#06b6d4" text-anchor="middle">AWM3300V</text>
  <text x="305" y="112" font-family="monospace" font-size="8" fill="#67e8f9" text-anchor="middle">AIRFLOW</text>
  <text x="305" y="124" font-family="monospace" font-size="7" fill="#06b6d4" text-anchor="middle">SENSOR</text>
  <text x="305" y="136" font-family="monospace" font-size="9" fill="#fbbf24" text-anchor="middle" font-weight="bold">12.4 L/m</text>
  <!-- ADC block -->
  <rect x="20" y="155" width="80" height="35" rx="5" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="60" y="170" font-family="monospace" font-size="8" fill="#06b6d4" text-anchor="middle">ADS1115</text>
  <text x="60" y="182" font-family="monospace" font-size="7" fill="#67e8f9" text-anchor="middle">16-bit ADC</text>
  <!-- Voltage divider -->
  <rect x="115" y="155" width="80" height="35" rx="5" fill="#1e3a5f" stroke="#06b6d4" stroke-width="1.5"/>
  <text x="155" y="170" font-family="monospace" font-size="8" fill="#06b6d4" text-anchor="middle">V-Divider</text>
  <text x="155" y="182" font-family="monospace" font-size="7" fill="#67e8f9" text-anchor="middle">Signal Scale</text>
  <!-- Waveform display -->
  <rect x="210" y="155" width="165" height="35" rx="5" fill="#0f172a" stroke="#334155" stroke-width="1"/>
  <polyline points="215,178 225,170 235,175 245,163 255,172 265,168 275,174 285,165 295,171 305,167 315,173 325,169 330,174 340,168 350,172 360,166 370,171" fill="none" stroke="#06b6d4" stroke-width="1.5"/>
  <!-- Label -->
  <rect x="10" y="10" width="200" height="24" rx="4" fill="#06b6d4" opacity="0.15"/>
  <text x="20" y="27" font-family="monospace" font-size="12" fill="#06b6d4" font-weight="bold">Airflow · AWM3300V · ADC</text>
</svg>
