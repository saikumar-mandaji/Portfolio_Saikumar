<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg4)" rx="10"/>
  <!-- Block: Temp Sensor -->
  <rect x="20" y="80" width="80" height="50" rx="6" fill="#1e3a5f" stroke="#38bdf8" stroke-width="1.5"/>
  <text x="60" y="100" font-family="monospace" font-size="8" fill="#38bdf8" text-anchor="middle">TEMP</text>
  <text x="60" y="113" font-family="monospace" font-size="8" fill="#38bdf8" text-anchor="middle">SENSOR</text>
  <text x="60" y="124" font-family="monospace" font-size="7" fill="#7dd3fc" text-anchor="middle">DS18B20</text>
  <!-- Arrow -->
  <line x1="100" y1="105" x2="130" y2="105" stroke="#38bdf8" stroke-width="2"/>
  <polygon points="128,101 136,105 128,109" fill="#38bdf8"/>
  <!-- Block: MCU -->
  <rect x="135" y="70" width="80" height="70" rx="6" fill="#1e3a5f" stroke="#60a5fa" stroke-width="2"/>
  <text x="175" y="95" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle">MCU</text>
  <text x="175" y="108" font-family="monospace" font-size="8" fill="#60a5fa" text-anchor="middle">STM32</text>
  <text x="175" y="120" font-family="monospace" font-size="7" fill="#93c5fd" text-anchor="middle">Digital Logic</text>
  <text x="175" y="131" font-family="monospace" font-size="7" fill="#93c5fd" text-anchor="middle">Processing</text>
  <!-- Arrow -->
  <line x1="215" y1="105" x2="245" y2="105" stroke="#60a5fa" stroke-width="2"/>
  <polygon points="243,101 251,105 243,109" fill="#60a5fa"/>
  <!-- Block: PLC -->
  <rect x="250" y="70" width="80" height="70" rx="6" fill="#1e3a5f" stroke="#a78bfa" stroke-width="2"/>
  <text x="290" y="95" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">PLC</text>
  <text x="290" y="108" font-family="monospace" font-size="8" fill="#a78bfa" text-anchor="middle">Controller</text>
  <text x="290" y="120" font-family="monospace" font-size="7" fill="#c4b5fd" text-anchor="middle">Relay Logic</text>
  <!-- Arrow down to relay -->
  <line x1="290" y1="140" x2="290" y2="165" stroke="#a78bfa" stroke-width="2"/>
  <polygon points="286,163 290,171 294,163" fill="#a78bfa"/>
  <!-- Block: Relay -->
  <rect x="250" y="170" width="80" height="35" rx="6" fill="#1e3a5f" stroke="#f472b6" stroke-width="1.5"/>
  <text x="290" y="188" font-family="monospace" font-size="8" fill="#f472b6" text-anchor="middle">RELAY OUTPUT</text>
  <text x="290" y="199" font-family="monospace" font-size="7" fill="#fb7185" text-anchor="middle">Industrial Control</text>
  <!-- Temp reading display -->
  <rect x="20" y="150" width="100" height="30" rx="4" fill="#0f172a" stroke="#38bdf8" stroke-width="1"/>
  <text x="30" y="163" font-family="monospace" font-size="8" fill="#38bdf8">TEMP: </text>
  <text x="72" y="163" font-family="monospace" font-size="9" fill="#fbbf24" font-weight="bold">72.4°C</text>
  <text x="30" y="175" font-family="monospace" font-size="7" fill="#64748b">STATUS: ACTIVE</text>
  <!-- Label -->
  <rect x="10" y="10" width="175" height="24" rx="4" fill="#60a5fa" opacity="0.15"/>
  <text x="20" y="27" font-family="monospace" font-size="12" fill="#60a5fa" font-weight="bold">Sensor → MCU → PLC → Relay</text>
</svg>
