<svg xmlns="http://www.w3.org/2000/svg" width="400" height="220" viewBox="0 0 400 220">
  <defs>
    <linearGradient id="bg3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1a0f00"/>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="80%" r="50%">
      <stop offset="0%" style="stop-color:#fef08a"/>
      <stop offset="40%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#7c2d12;stop-opacity:0"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#fbbf24;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="220" fill="url(#bg3)" rx="10"/>
  <!-- Glow halo -->
  <ellipse cx="200" cy="110" rx="90" ry="80" fill="url(#glow)"/>
  <!-- Flame shape -->
  <ellipse cx="200" cy="100" rx="18" ry="35" fill="url(#flame)" opacity="0.95"/>
  <ellipse cx="200" cy="105" rx="10" ry="22" fill="#fef08a" opacity="0.7"/>
  <!-- Diya bowl -->
  <ellipse cx="200" cy="148" rx="38" ry="12" fill="#92400e"/>
  <path d="M162 148 Q180 168 200 170 Q220 168 238 148 Z" fill="#78350f"/>
  <!-- LED dots around bowl -->
  <circle cx="168" cy="148" r="3" fill="#fbbf24"/>
  <circle cx="180" cy="158" r="3" fill="#f97316"/>
  <circle cx="200" cy="162" r="3" fill="#fbbf24"/>
  <circle cx="220" cy="158" r="3" fill="#f97316"/>
  <circle cx="232" cy="148" r="3" fill="#fbbf24"/>
  <!-- Touch wave indicator -->
  <circle cx="310" cy="50" r="15" fill="none" stroke="#fbbf24" stroke-width="1.5" opacity="0.5"/>
  <circle cx="310" cy="50" r="22" fill="none" stroke="#fbbf24" stroke-width="1" opacity="0.3"/>
  <text x="310" y="54" font-family="monospace" font-size="8" fill="#fbbf24" text-anchor="middle">TOUCH</text>
  <!-- Label -->
  <rect x="10" y="10" width="180" height="24" rx="4" fill="#f97316" opacity="0.15"/>
  <text x="20" y="27" font-family="monospace" font-size="12" fill="#f97316" font-weight="bold">LED · Touch Control · PWM</text>
  <!-- Tech badges -->
  <rect x="10" y="190" width="55" height="18" rx="9" fill="#f97316" opacity="0.2"/>
  <text x="20" y="203" font-family="monospace" font-size="9" fill="#f97316">Custom IC</text>
  <rect x="73" y="190" width="45" height="18" rx="9" fill="#f97316" opacity="0.2"/>
  <text x="82" y="203" font-family="monospace" font-size="9" fill="#f97316">PWM</text>
  <rect x="126" y="190" width="65" height="18" rx="9" fill="#f97316" opacity="0.2"/>
  <text x="133" y="203" font-family="monospace" font-size="9" fill="#f97316">Touch Sense</text>
</svg>
